<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapMatch Flux // AI Bonding Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    
    <style>
        /* 🧪 HARDCORE NEON GLOW FILTERS AND ANIMATIONS MATRIX */
        @keyframes subtleBreathe {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(244, 63, 94, 0.2)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.5)); transform: scale(1.02); }
        }
        .neon-glow-ring {
            box-shadow: inset 0 0 20px rgba(244, 63, 94, 0.3), 0 0 25px rgba(139, 92, 246, 0.2);
            animation: subtleBreathe 3s infinite ease-in-out;
        }
        .text-glow-neon {
            text-shadow: 0 0 10px rgba(244, 63, 94, 0.6), 0 0 20px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body class="bg-[#07050d] text-slate-200 min-h-screen font-sans overflow-x-hidden">

    <header class="h-16 border-b border-rose-950/40 bg-[#0f0a1c]/80 backdrop-blur-md flex items-center justify-between px-6 z-50 relative">
        <div class="flex items-center gap-3">
            <div class="h-8 w-8 bg-gradient-to-tr from-rose-500 to-violet-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-rose-500/20">❤️</div>
            <h1 class="text-lg font-semibold tracking-wider bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">SnapMatch <span class="text-rose-400 font-mono text-sm">Flux AI v1.1</span></h1>
        </div>
        <div class="text-xs font-mono text-rose-400 border border-rose-500/30 bg-rose-500/5 px-3 py-1 rounded-full text-glow-neon">GLOW MATRIX SHADERS LOCKED</div>
    </header>

    <main class="flex flex-col lg:flex-row h-[calc(100vh-64px)] w-full overflow-hidden">
        
        <section class="flex-1 bg-[#040307] p-8 flex flex-col items-center justify-center gap-8 overflow-y-auto">
            
            <div class="flex flex-col md:flex-row gap-6 w-full max-w-2xl justify-center">
                <div class="flex-1 border-2 border-dashed border-slate-800/80 bg-[#120f1d]/30 hover:border-rose-500/40 rounded-2xl p-6 text-center relative min-h-[250px] flex flex-col items-center justify-center transition-all duration-300" id="boxA">
                    <input type="file" id="fileA" class="hidden" accept="image/*">
                    <div class="inner-content cursor-pointer" onclick="document.getElementById('fileA').value = ''; document.getElementById('fileA').click()">
                        <i class="fa-solid fa-user-circle text-3xl text-rose-400/40 mb-2 transition-transform hover:scale-110"></i>
                        <p class="text-xs font-medium text-slate-400">Upload Partner Alpha</p>
                    </div>
                    <canvas id="canvasA" class="absolute inset-0 w-full h-full object-cover rounded-2xl hidden"></canvas>
                </div>

                <div class="flex-1 border-2 border-dashed border-slate-800/80 bg-[#120f1d]/30 hover:border-violet-500/40 rounded-2xl p-6 text-center relative min-h-[250px] flex flex-col items-center justify-center transition-all duration-300" id="boxB">
                    <input type="file" id="fileB" class="hidden" accept="image/*">
                    <div class="inner-content cursor-pointer" onclick="document.getElementById('fileB').value = ''; document.getElementById('fileB').click()">
                        <i class="fa-solid fa-user-circle text-3xl text-violet-400/40 mb-2 transition-transform hover:scale-110"></i>
                        <p class="text-xs font-medium text-slate-400">Upload Partner Beta</p>
                    </div>
                    <canvas id="canvasB" class="absolute inset-0 w-full h-full object-cover rounded-2xl hidden"></canvas>
                </div>
            </div>

            <button id="calculateBtn" class="px-8 py-3 bg-gradient-to-r from-rose-500 to-violet-600 font-semibold text-sm rounded-xl shadow-lg shadow-rose-500/20 hover:opacity-90 transition-all duration-200 active:scale-95 flex items-center gap-2 cursor-pointer">
                <i class="fa-solid fa-heart-pulse mr-1 animate-pulse"></i> Compute Bonding Matrix
            </button>
        </section>

        <aside class="w-full lg:w-[420px] bg-[#0e0a17]/95 backdrop-blur-md p-6 flex flex-col gap-6 overflow-y-auto h-full shadow-2xl border-l border-rose-950/20">
            <div>
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Matrix Analysis</h2>
                <p class="text-[11px] text-slate-500">Neural facial symmetry calculation diagnostics</p>
            </div>

            <hr class="border-slate-800/60">

            <div id="resultsPanel" class="opacity-10 pointer-events-none transition-all duration-500 transform scale-95 flex flex-col items-center gap-6">
                
                <div class="relative w-44 h-44 rounded-full border-4 border-rose-500/30 flex items-center justify-center bg-rose-950/5 neon-glow-ring">
                    <div class="text-4xl font-mono font-black text-rose-400 text-glow-neon" id="scoreDisplay">0%</div>
                </div>

                <div class="w-full flex flex-col gap-4">
                    <div class="bg-gradient-to-r from-rose-950/20 to-violet-950/20 border border-rose-500/10 rounded-xl p-4 shadow-inner">
                        <h4 class="text-xs font-bold uppercase text-rose-400 tracking-wider">Bonding Dynamic</h4>
                        <p id="bondName" class="text-sm font-bold text-violet-300 mt-1 tracking-wide">Awaiting Ingestion...</p>
                    </div>

                    <div class="bg-slate-900/40 border border-slate-800/80 rounded-xl p-4">
                        <h4 class="text-xs font-bold uppercase text-slate-500 tracking-wider">Relationship Prediction</h4>
                        <p id="bondDesc" class="text-xs text-slate-400 mt-1 leading-relaxed">Both face prints must be submitted to map geometric coordinates.</p>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
